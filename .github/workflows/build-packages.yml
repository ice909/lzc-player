name: Build packages

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Package version. Defaults to the CMake project version."
        required: false
        type: string
  push:
    tags:
      - "v*"
      - "[0-9]*"

permissions:
  contents: write

env:
  APP_NAME: lzc-player
  QT_VERSION: 6.8.2
  LINUXDEPLOYQT_URL: https://github.com/probonopd/linuxdeployqt/releases/download/continuous/linuxdeployqt-continuous-x86_64.AppImage
  APPIMAGETOOL_URL: https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage

jobs:
  prepare:
    name: Prepare package metadata
    runs-on: ubuntu-22.04
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        shell: bash
        env:
          INPUT_VERSION: ${{ inputs.version || '' }}
        run: |
          set -Eeuo pipefail

          if [[ -n "${INPUT_VERSION}" ]]; then
            version="${INPUT_VERSION}"
          elif [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version="$(sed -nE 's/^[[:space:]]*project\([^)]*VERSION[[:space:]]+([^[:space:])]+).*/\1/p' CMakeLists.txt | head -n 1)"
          fi

          if [[ -z "${version}" ]]; then
            echo "Unable to resolve package version." >&2
            exit 1
          fi

          if [[ ! "${version}" =~ ^[0-9A-Za-z][0-9A-Za-z._+-]*$ ]]; then
            echo "Invalid package version: ${version}" >&2
            echo "Use only letters, numbers, dot, underscore, plus, and hyphen." >&2
            exit 1
          fi

          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "Package version: ${version}"

  linux-x64:
    name: Linux x86_64 AppImage
    runs-on: ubuntu-22.04
    needs: prepare
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        shell: bash
        run: |
          set -Eeuo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ca-certificates \
            cmake \
            curl \
            file \
            g++ \
            libmpv-dev \
            ninja-build \
            patchelf \
            pkg-config \
            python3 \
            python3-pip \
            zsync

      - name: Install Qt
        shell: bash
        run: |
          set -Eeuo pipefail
          python3 -m pip install --user --no-cache-dir aqtinstall
          python3 -m aqt install-qt linux desktop "${QT_VERSION}" linux_gcc_64 \
            -O "${RUNNER_TEMP}/Qt" \
            -m qtshadertools qtsvg
          echo "QT_ROOT=${RUNNER_TEMP}/Qt/${QT_VERSION}/gcc_64" >> "${GITHUB_ENV}"

      - name: Install AppImage tools
        shell: bash
        run: |
          set -Eeuo pipefail
          mkdir -p "${RUNNER_TEMP}/appimage-tools"
          curl -fsSL "${LINUXDEPLOYQT_URL}" -o "${RUNNER_TEMP}/appimage-tools/linuxdeployqt"
          curl -fsSL "${APPIMAGETOOL_URL}" -o "${RUNNER_TEMP}/appimage-tools/appimagetool"
          chmod +x "${RUNNER_TEMP}/appimage-tools/linuxdeployqt" "${RUNNER_TEMP}/appimage-tools/appimagetool"
          echo "LINUXDEPLOYQT_BIN=${RUNNER_TEMP}/appimage-tools/linuxdeployqt" >> "${GITHUB_ENV}"
          echo "APPIMAGETOOL_BIN=${RUNNER_TEMP}/appimage-tools/appimagetool" >> "${GITHUB_ENV}"
          echo "APPIMAGE_EXTRACT_AND_RUN=1" >> "${GITHUB_ENV}"

      - name: Build package
        shell: bash
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          set -Eeuo pipefail
          export ARCH="x86_64"
          bash scripts/package-linux.sh

          appimage="$(find dist/linux -maxdepth 1 -type f -name '*.AppImage' | head -n 1)"
          if [[ -z "${appimage}" ]]; then
            echo "AppImage was not created." >&2
            exit 1
          fi

          target="dist/linux/${APP_NAME}-${VERSION}-linux-x86_64.AppImage"
          mv -f "${appimage}" "${target}"
          file "${target}"
          file "${target}" | grep -Eq 'x86-64|x86_64|ELF 64-bit'

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: lzc-player-${{ needs.prepare.outputs.version }}-linux-x86_64
          path: dist/linux/lzc-player-${{ needs.prepare.outputs.version }}-linux-x86_64.AppImage
          if-no-files-found: error

  release:
    name: Attach packages to release
    runs-on: ubuntu-22.04
    needs:
      - prepare
      - linux-x64
    if: github.event_name == 'push' && github.ref_type == 'tag'
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/release
          merge-multiple: true

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/release/*
